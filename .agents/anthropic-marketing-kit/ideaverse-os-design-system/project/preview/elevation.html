<!doctype html><html><head><meta charset="utf-8">
<title>Elevation · Flat Paper</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 26px; background: var(--cream); }
  .lbl  { font-family: var(--font-body); font-weight: 600; font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--teal); margin-bottom: 14px; }
  .stack { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .layer { padding: 24px 18px; }
  .recess { background: var(--cream-deep); border: 1px solid var(--ink-10); }
  .base   { background: var(--cream);     border: 1px dashed var(--ink-10); }
  .lift   { background: var(--cream-pale); border: 1px solid #B19CD955; }
  .name { font-family: var(--font-body); font-weight: 600; font-size: 13px; color: var(--ink); }
  .role { font-family: var(--font-body); font-size: 11px; color: var(--ink-soft); margin-top: 4px; line-height: 1.4; }
  .rule { margin-top: 14px; font-family: var(--font-body); font-size: 12px; color: var(--ink); padding: 10px 12px; background: var(--cream-pale); border: 1px solid #B19CD955; max-width: none; }
  .rule b { color: #8E7AB8; }
</style>
</head>
<body>
  <div class="lbl">07 / Elevation · No Shadow, Tonal Cream Only</div>
  <div class="stack">
    <div class="layer recess"><div class="name">Recess</div><div class="role">cream-deep · alt rows, pull-quotes</div></div>
    <div class="layer base"><div class="name">Base</div><div class="role">cream · default canvas</div></div>
    <div class="layer lift"><div class="name">Lift</div><div class="role">cream-pale · cards, blocks</div></div>
  </div>
  <p class="rule"><b>The Hairline Rule.</b> Borders are 1px. No side-stripe accents. If a divider needs more weight, increase saturation, not thickness.</p>
</body></html>
