<!doctype html><html><head><meta charset="utf-8">
<title>Color · Identity</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 0; }
  .card { padding: 22px 26px; }
  .row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .swatch { display: grid; grid-template-columns: 56px 1fr; gap: 14px; align-items: center; padding: 10px 12px; background: var(--cream-pale); border: 1px solid oklch(0.71 0.08 296 / 0.25); }
  .chip { width: 56px; height: 56px; border: 1px solid var(--ink-10); }
  .name { font-family: var(--font-body); font-weight: 600; font-size: 13px; color: var(--ink); letter-spacing: 0; }
  .val  { font-family: var(--font-mono); font-size: 11px; color: var(--ink-soft); margin-top: 2px; }
  .lbl  { font-family: var(--font-body); font-weight: 600; font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--teal); margin-bottom: 8px; }
</style>
</head>
<body>
<div class="card">
  <div class="lbl">00 / Identity · Lilac + Ink</div>
  <div class="row">
    <div class="swatch"><div class="chip" style="background: #B19CD9"></div>
      <div><div class="name">Pastel Lilac</div><div class="val">#B19CD9 — primary</div></div></div>
    <div class="swatch"><div class="chip" style="background: #8E7AB8"></div>
      <div><div class="name">Lilac Deep</div><div class="val">#8E7AB8 — hover/pressed</div></div></div>
    <div class="swatch"><div class="chip" style="background: var(--ink)"></div>
      <div><div class="name">Notebook Ink</div><div class="val">oklch(0.30 0.02 280) — body text</div></div></div>
    <div class="swatch"><div class="chip" style="background: var(--ink-soft)"></div>
      <div><div class="name">Ink Soft</div><div class="val">oklch(0.45 0.02 280) — meta/captions</div></div></div>
  </div>
</div>
</body></html>
