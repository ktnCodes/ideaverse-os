<!doctype html><html><head><meta charset="utf-8">
<title>Type · Display & Headline</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 26px; }
  .lbl  { font-family: var(--font-body); font-weight: 600; font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--teal); margin-bottom: 16px; }
  .row { padding: 14px 0; border-bottom: 1px solid var(--ink-10); }
  .row:last-child { border-bottom: 0; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-soft); margin-bottom: 6px; }
  .display  { font-family: var(--font-display); font-weight: 700; font-size: 56px; line-height: 1.05; letter-spacing: -0.015em; color: #8E7AB8; margin: 0; }
  .headline { font-family: var(--font-display); font-weight: 700; font-size: 32px; line-height: 1.1; letter-spacing: -0.01em; color: #8E7AB8; margin: 0; }
</style>
</head>
<body>
  <div class="lbl">03 / Type · Display & Headline (Lora 700)</div>
  <div class="row">
    <div class="meta">DISPLAY · Lora 700 · clamp(2.75rem, 6vw, 4.5rem) · LH 1.05 · −0.015em · lilac</div>
    <h1 class="display">ideaverse-os</h1>
  </div>
  <div class="row">
    <div class="meta">HEADLINE · Lora 700 · clamp(1.75rem, 3.5vw, 2.5rem) · LH 1.10 · −0.01em · lilac</div>
    <h2 class="headline">Your knowledge base, written by conversation.</h2>
  </div>
</body></html>
