<!doctype html><html><head><meta charset="utf-8">
<title>Shape · Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 26px; }
  .lbl  { font-family: var(--font-body); font-weight: 600; font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--teal); margin-bottom: 14px; }
  .row { display: flex; gap: 16px; align-items: flex-end; }
  .item { text-align: center; }
  .box { width: 80px; height: 80px; background: #B19CD9; border: 1px solid #8E7AB8; }
  .name { font-family: var(--font-body); font-weight: 600; font-size: 13px; color: var(--ink); margin-top: 8px; }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--ink-soft); margin-top: 2px; }
  .note { font-family: var(--font-body); font-size: 12px; color: var(--ink-soft); margin-top: 14px; line-height: 1.5; max-width: none; }
</style>
</head>
<body>
  <div class="lbl">08 / Shape · Sharp by Default</div>
  <div class="row">
    <div class="item"><div class="box" style="border-radius: 0"></div>
      <div class="name">--r-none</div><div class="val">0px · default</div></div>
    <div class="item"><div class="box" style="border-radius: 2px"></div>
      <div class="name">--r-sm</div><div class="val">2px · primary CTAs</div></div>
    <div class="item"><div class="box" style="border-radius: 4px"></div>
      <div class="name">--r-md</div><div class="val">4px · max allowed</div></div>
    <div class="item"><div class="box" style="border-radius: 999px; background: #8E7AB8; border-color: #6F5C9E"></div>
      <div class="name">pill</div><div class="val">999px · status badge only</div></div>
  </div>
  <p class="note">Editorial print, not glassy chrome. Most surfaces are sharp; CTAs may go to 2px; the status badge is the only pill in the system.</p>
</body></html>
