<!doctype html><html><head><meta charset="utf-8">
<title>Brand · Wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 30px; background: var(--cream); }
  .lbl  { font-family: var(--font-body); font-weight: 600; font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--teal); margin-bottom: 18px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: end; }
  .mark { font-family: var(--font-display); font-weight: 700; font-size: 56px; line-height: 1; letter-spacing: -0.02em; color: #8E7AB8; margin: 0; }
  .tag  { font-family: var(--font-display); font-style: italic; font-weight: 500; font-size: 16px; line-height: 1.3; color: var(--ink); margin-top: 8px; max-width: 320px; }
  .stamp { display: inline-block; padding: 8px 14px; background: var(--ink); color: var(--cream); font-family: var(--font-mono); font-size: 12px; letter-spacing: 0; border-radius: 6px; }
  .stamp .p { color: var(--amber); margin-right: 6px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-soft); margin-top: 8px; }
</style>
</head>
<body>
  <div class="lbl">16 / Wordmark · Lora 700 Lilac on Cream</div>
  <div class="row">
    <div>
      <h1 class="mark">ideaverse-os</h1>
      <p class="tag">Your knowledge base, written by conversation.</p>
    </div>
    <div>
      <span class="stamp"><span class="p">$</span>npx ideaverse-os init</span>
      <div class="meta">Stamped install block — the alternative wordmark on dark surfaces.</div>
    </div>
  </div>
</body></html>
